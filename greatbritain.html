<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クイズサイト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 15px;
      background: url("coin.jpg") no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .quiz-box {
      width: 100%;
      max-width: 500px;
      margin: auto;
      background: rgba(255,255,255,0.92);
      padding: 20px;
      border-radius: 15px;
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      backdrop-filter: blur(5px);
    }

    h2 {
      font-size: 20px;
      line-height: 1.5;
    }

    .progress {
      font-size: 14px;
      margin-bottom: 10px;
      color: #666;
    }

    .choice-btn {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: #f1f1f1;
      cursor: pointer;
    }

    .choice-btn:active {
      transform: scale(0.97);
    }

    .correct {
      background: #4CAF50 !important;
      color: white;
    }

    .wrong {
      background: #f44336 !important;
      color: white;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
    }

    #nextBtn {
      margin-top: 15px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #backBtn {
      display: none;
      margin-top: 15px;
      padding: 14px;
      width: 100%;
      border-radius: 12px;
      background: #444;
      color: white;
      text-decoration: none;
      display: block;
    }
  </style>
</head>

<body>

  <div class="quiz-box">
    <div class="progress" id="progress"></div>
    <h2 id="question"></h2>
    <div id="choices"></div>
    <p id="result"></p>

    <button id="nextBtn" onclick="nextQuestion()">次の問題</button>
    <a href="index.html" id="backBtn">トップに戻る</a>
  </div>

  <script>
    const quiz = [
      {
        question: "大英帝国全盛期の女王は？",
        choices: ["エリザベス1世", "エリザベス2世", "ヴィクトリア"],
        answer: 2
      },
      {
        question: "ウェールズを併合した王は？",
        choices: ["ヘンリ8世", "ジョージ3世", "アルフレッド大王"],
        answer: 1
      },
      {
        question: "ニュージーランドの先住民族マオリと英国王室の間で締結された条約は？",
        choices: ["英新和平条約", "ワイタンギ条約", "クライストチャーチ条約"],
        answer: 1
      },
      {
        question: "万有引力の発見などで有名で、王立造幣局長官も務めた人物は？",
        choices: ["アイザック・ニュートン", "アインシュタイン", "ガリレオ"],
        answer: 0
      },
      {
        question: "南アフリカでダイヤモンド・金鉱で巨富を得て、ローデシアを建設した人物は？",
        choices: ["セシル・ローズ", "チャーチル", "リヴィングストン"],
        answer: 0
      }
    ];

    let current = 0;

    function loadQuestion() {
      const q = quiz[current];

      document.getElementById("progress").textContent =
        (current + 1) + " / " + quiz.length;

      document.getElementById("question").textContent = q.question;

      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";

      q.choices.forEach((choice, index) => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.className = "choice-btn";
        btn.onclick = () => checkAnswer(btn, index);
        choicesDiv.appendChild(btn);
      });

      document.getElementById("result").textContent = "";
    }

    function checkAnswer(button, index) {
      const correct = quiz[current].answer;
      const buttons = document.querySelectorAll(".choice-btn");

      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === correct) btn.classList.add("correct");
        if (i === index && i !== correct) btn.classList.add("wrong");
      });

      if (index === correct) {
        document.getElementById("result").textContent = "正解！🎉";
      } else {
        document.getElementById("result").textContent = "不正解😢";
      }
    }

    function nextQuestion() {
      current++;

      if (current >= quiz.length) {
        document.getElementById("question").textContent = "終了です！";
        document.getElementById("choices").innerHTML = "";
        document.getElementById("progress").textContent = "";
        document.getElementById("result").textContent = "お疲れさまでした！";

        // 👇ここが今回のポイント
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("backBtn").style.display = "block";

      } else {
        loadQuestion();
      }
    }

    loadQuestion();
  </script>

</body>
</html>
