<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Antique Coin Quest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: url("coin.jpg") no-repeat center center fixed;
      background-size: cover;
      position: relative;
      color: white;
    }

    /* 暗いフィルター */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 26px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      margin-bottom: 30px;
      opacity: 0.85;
    }

    .card {
      background: rgba(255, 255, 255, 0.9); /* 少し透ける */
      color: #333;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .card p {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .quiz-btn {
      background: #667eea;
    }

    .quiz-btn:hover {
      background: #5563c1;
    }

    .diagnosis-btn {
      background: #ff7e5f;
    }

    .diagnosis-btn:hover {
      background: #e96a50;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Antique Coin Quest</h1>
    <p class="subtitle">コインの世界を探検しよう</p>

    <div class="card">
      <h2>🎮 コインクイズ</h2>
      <p>コインにまつわるクイズに挑戦しましょう</p>
      <a href="greatbritain.html" class="btn quiz-btn">スタート</a>
    </div>

    <div class="card">
      <h2>🔮 YES/NO診断</h2>
      <p>あなたに合ったコインの集め方を診断します</p>
      <a href="diagnosis.html" class="btn diagnosis-btn">スタート</a>
    </div>
  </div>

</body>
</html>
