<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Antique Coin Quest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .card {
      background: white;
      color: #333;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .card p {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      color: white;
    }

    .quiz-btn {
      background: #667eea;
    }

    .quiz-btn:hover {
      background: #5563c1;
    }

    .diagnosis-btn {
      background: #ff7e5f;
    }

    .diagnosis-btn:hover {
      background: #e96a50;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Antique Coin Quest</h1>
    <p class="subtitle">コインと歴史をめぐるクイズ＆診断サイト</p>

    <div class="card">
      <h2>🎮 クイズに挑戦</h2>
      <p>大英帝国や歴史に関するクイズに挑戦しよう</p>
      <a href="quiz.html" class="btn quiz-btn">スタート</a>
    </div>

    <div class="card">
      <h2>🔮 YES/NO診断</h2>
      <p>あなたに合ったコインスタイルを診断します</p>
      <a href="diagnosis.html" class="btn diagnosis-btn">診断する</a>
    </div>

  </div>

</body>
</html>
