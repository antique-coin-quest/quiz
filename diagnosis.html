<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YES/NO診断</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background: url("coin.jpg") no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      z-index: -1;
    }

    .box {
      max-width: 420px;
      margin: auto;
      background: rgba(255, 255, 255, 0.92);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
    }

    h2 {
      font-size: 18px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.98);
    }

    .yes {
      background: #4CAF50;
      color: white;
    }

    .no {
      background: #f44336;
      color: white;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      line-height: 1.6;
    }

    .back-btn {
      display: none; /* 最初は非表示 */
      margin-top: 20px;
      padding: 12px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2 id="question"></h2>

    <button class="yes" id="yesBtn" onclick="answer(true)">YES</button>
    <button class="no" id="noBtn" onclick="answer(false)">NO</button>

    <p id="result"></p>

    <a href="index.html" class="back-btn" id="backBtn">トップに戻る</a>
  </div>

  <script>
    const questions = [
      "どちらかと言えばコレクション目的というよりは投資目的だ",
      "どちらかと言えば日本のコインより海外のコインに興味がある",
      "1枚のコインに10万円以上払ってもいいと思う"
    ];

    let current = 0;
    let answers = [];

    function loadQuestion() {
      document.getElementById("question").textContent = questions[current];
    }

    function answer(isYes) {
      answers.push(isYes);
      current++;

      if (current >= questions.length) {
        showResult();
      } else {
        loadQuestion();
      }
    }

    function showResult() {
      const q1 = answers[0];
      const q2 = answers[1];
      const q3 = answers[2];

      let resultText = "";

      if (q1 && q2 && q3) {
        resultText = "スラブ入りのイギリス・ヴィクトリア金貨、フランス・ナポレオン金貨などがおすすめです！🌍";
      } else if (q1 && !q2 && q3) {
        resultText = "高額な日本の金貨や記念コインがおすすめです！";
      } else if (!q1 && q2 && !q3) {
        resultText = "裸の外国コインがおすすめです！";
      } else if (!q1 && !q2 && !q3) {
        resultText = "裸の日本コインがおすすめです！";
      } else {
        resultText = "回答準備中です！";
      }

      document.getElementById("question").textContent = "診断結果";
      document.getElementById("result").textContent = resultText;

      // YES / NOボタンを消す
      document.getElementById("yesBtn").style.display = "none";
      document.getElementById("noBtn").style.display = "none";

      // トップに戻るボタンを表示
      document.getElementById("backBtn").style.display = "block";
    }

    loadQuestion();
  </script>

</body>
</html>
