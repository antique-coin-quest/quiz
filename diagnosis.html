<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YES/NO診断</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .yes {
      background: #4CAF50;
      color: white;
    }

    .no {
      background: #f44336;
      color: white;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2 id="question"></h2>

    <button class="yes" onclick="answer(true)">YES</button>
    <button class="no" onclick="answer(false)">NO</button>

    <p id="result"></p>
  </div>

  <script>
    const questions = [
      "どちらかと言えばコレクション目的というよりは投資目的だ",
      "どちらかと言えば日本のコインより海外のコインに興味がある",
    ];

    let current = 0;
    let score = 0;

    function loadQuestion() {
      document.getElementById("question").textContent = questions[current];
    }

    function answer(isYes) {
      if (isYes) score++;

      current++;

      if (current >= questions.length) {
        showResult();
      } else {
        loadQuestion();
      }
    }

    function showResult() {
      let resultText = "";

      if (score >= 2) {
        resultText = "スラブ入りのイギリス・ヴィクトリア、フランス・ナポレオンなどがおすすめです！🌍";
      } else if (score = 1) {
        resultText = "回答準備中です！";
      } else {
        resultText = "裸のコインがおすすめです！";
      }

      document.getElementById("question").textContent = "診断結果";
      document.getElementById("result").textContent = resultText;
    }

    loadQuestion();
  </script>

</body>
</html>
