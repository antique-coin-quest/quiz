<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YES/NO診断</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      font-size: 18px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .yes {
      background: #4CAF50;
      color: white;
    }

    .no {
      background: #f44336;
      color: white;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
    }

    .back-btn {
      display: block;
      margin-top: 20px;
      padding: 12px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2 id="question"></h2>

    <button class="yes" onclick="answer(true)">YES</button>
    <button class="no" onclick="answer(false)">NO</button>

    <p id="result"></p>

    <a href="index.html" class="back-btn">トップに戻る</a>
  </div>

  <script>
    const questions = [
      "どちらかと言えばコレクション目的というよりは投資目的だ",
      "どちらかと言えば日本のコインより海外のコインに興味がある"
    ];

    let current = 0;
    let answers = [];

    function loadQuestion() {
      document.getElementById("question").textContent = questions[current];
    }

    function answer(isYes) {
      answers.push(isYes);
      current++;

      if (current >= questions.length) {
        showResult();
      } else {
        loadQuestion();
      }
    }

    function showResult() {
      const q1 = answers[0];
      const q2 = answers[1];

      let resultText = "";

      if (q1 && q2) {
        resultText = "スラブ入りのイギリス・ヴィクトリア、フランス・ナポレオンなどがおすすめです！🌍";
      } else if (!q1 && !q2) {
        resultText = "裸のコインがおすすめです！";
      } else {
        resultText = "回答準備中です！";
      }

      document.getElementById("question").textContent = "診断結果";
      document.getElementById("result").textContent = resultText;
    }

    loadQuestion();
  </script>

</body>
</html>
